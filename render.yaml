services:
  - type: web
    name: wbf-mailing-list
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: ALLOWED_ORIGINS
        value: https://workbringsfreedom.com,https://www.workbringsfreedom.com
      - key: ADMIN_KEY
        value: RESET123
      - key: MONGODB_URI
        sync: false
