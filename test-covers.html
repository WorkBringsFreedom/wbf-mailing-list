<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cover Test</title>
<style>
  body { font-family: sans-serif; padding: 20px; background: #f3ecd8; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
  .book { border: 2px solid #111; box-shadow: 4px 4px 0 #c8102e; }
  .cover { aspect-ratio: 2/3; overflow: hidden; background: #111; }
  .cover img { width: 100%; height: 100%; object-fit: cover; display: block; border: none; }
  .title { padding: 8px; font-size: 12px; }
</style>
</head>
<body>
<h2>Cover Test</h2>
<div class="grid">
  <div class="book">
    <div class="cover"><img src="covers/deathofwest.jpg" alt="Death of the West"></div>
    <div class="title">The Death of the West</div>
  </div>
  <div class="book">
    <div class="cover"><img src="covers/conservativemind.jpg" alt="Conservative Mind"></div>
    <div class="title">The Conservative Mind</div>
  </div>
  <div class="book">
    <div class="cover"><img src="covers/cultureofnarcissism.jpg" alt="Culture of Narcissism"></div>
    <div class="title">The Culture of Narcissism</div>
  </div>
</div>
</body>
</html>
